<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>alcove // launchpad</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<canvas id="stars" aria-hidden="true"></canvas>
<div class="scanlines" aria-hidden="true"></div>

<div id="orbit-stage">
  <svg id="orbit-svg" aria-hidden="true"></svg>
  <div id="hub">
    <h1 class="glitch" data-text="alcove">alcove</h1>
    <p class="tagline">everything, in orbit</p>
    <p class="status"><span class="dot"></span><span id="status-count">-- services orbiting</span></p>
    <div id="clock" class="clock">--:--:--</div>
  </div>
  <!-- .node anchors are generated into here by app.js -->
</div>

<div id="tooltip" role="tooltip"></div>

<main id="fallback-list"><!-- built by app.js for narrow screens --></main>

<footer>
  <a href="https://mgmt.lan">&larr; back to the classic dashboard</a>
</footer>

<script src="app.js"></script>
</body>
</html>
